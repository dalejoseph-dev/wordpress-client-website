<style>
/* Section Wrapper */
.team2-section {
  padding: 80px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.team2-header {
  text-align: center;
  margin-bottom: 60px;
}

.team2-header-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}

.team2-header-label span {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #1C3C68;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.team2-header-line {
  height: 1px;
  width: 100px;
  background-color: #809AB1;
}

.team2-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0;
  line-height: 1.15;
}

/* Grid */
.team2-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Card */
.team2-card {
  background-color: #ffffff;
  border: 1px solid #809AB1;
  border-radius: 16px;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.3s ease;
  padding: 20px 20px 28px 20px;
}

.team2-card:hover {
  box-shadow: 0 12px 40px rgba(32, 72, 120, 0.15);
  transform: translateY(-4px);
}

/* Image Wrap */
.team2-card-img-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background-color: #C6CCC6;
}

.team2-card-img-wrap img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  object-position: top;
  display: block;
  transition: transform 0.4s ease;
}

.team2-card:hover .team2-card-img-wrap img {
  transform: scale(1.03);
}

/* Social Bar */
.team2-card-socials {
  position: absolute;
  bottom: 16px;
  right: 16px;
  background-color: #ffffff;
  border-radius: 50px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 16px rgba(14, 44, 79, 0.15);
}

.team2-social {
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.team2-social:hover {
  opacity: 0.6;
  transform: scale(1.15);
}

/* Card Info */
.team2-card-info {
  padding: 20px 8px 0 8px;
  text-align: center;
}

.team2-card-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0 0 8px 0;
}

.team2-card-info p {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #809AB1;
  margin: 0;
  letter-spacing: 0.3px;
}

/* Tablet - 1024px */
@media (max-width: 1024px) {
  .team2-section {
    padding: 60px 40px;
  }

  .team2-header-title {
    font-size: 40px;
  }

  .team2-card-img-wrap img {
    height: 280px;
  }
}

/* Mobile - 600px */
@media (max-width: 600px) {
  .team2-section {
    padding: 48px 24px;
  }

  .team2-header-title {
    font-size: 30px;
  }

  .team2-header-line {
    width: 60px;
  }

  .team2-grid {
    grid-template-columns: 1fr;
  }

  .team2-card-img-wrap img {
    height: 320px;
  }
}
</style>
