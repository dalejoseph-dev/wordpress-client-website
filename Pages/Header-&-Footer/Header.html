  });
  
  document.addEventListener('DOMContentLoaded', (event) => {
    // Find the specific link
    const targetLink = document.querySelector('YOUR_MENU_ITEM_SELECTOR');

    if (targetLink) {
        // Store the initial link
        const initialUrl = targetLink.href;
        const newUrl = 'https://www.yournewlink.com'; // The URL you want to change to

        // Add a click event listener
        targetLink.addEventListener('click', function(e) {
            // Prevent the default navigation initially
            e.preventDefault();

            // Check the current href and update it for subsequent clicks
            if (this.href === initialUrl) {
                this.href = newUrl;
            } else {
                // Optional: logic to revert or change to another link
            }

            // Manually navigate to the new or original URL
            window.location.href = this.href;
        });
    }
});

</script>

<style>
   /* ── Header Wrapper ── */
.pro-header {
  background-color: #204878;

/* ── Nav Container ── */

/* ── Logo ── */
.pro-nav-logo {

  flex-shrink: 0;
}

.pro-nav-logo span {

  font-size: 22px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.5px;
}

.pro-nav-logo svg {
  stroke: #C6CCC6;
}

.pro-nav-logo-img {
  width: 10rem;
  height: 10rem;
  object-fit: contain;
}

/* ── Nav Links ── */
.pro-nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
  margin: 0;
  padding: 0;
  flex: 1;
  justify-content: center;
}

.pro-nav-item {
  position: relative;
}

.pro-nav-link {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #C6CCC6;
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 8px;
  transition: color 0.3s ease, background 0.3s ease;
  white-space: nowrap;
}

.pro-nav-link:hover {
  color: #ffffff;
  background-color: #1C3C68;
  text-decoration: none;
}

.pro-chevron {
  transition: transform 0.3s ease;
  color: #809AB1;
}

.pro-has-dropdown:hover .pro-chevron {
  transform: rotate(180deg);
  color: #ffffff;
}

/* ── Dropdown ── */
.pro-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  background-color: #1C3C68;
  border: 1px solid #809AB1;
  border-radius: 12px;
  padding: 8px;
  min-width: 200px;
  box-shadow: 0 12px 40px rgba(14, 44, 79, 0.4);
  z-index: 9998;
}

.pro-has-dropdown:hover .pro-dropdown {
  display: flex;
  flex-direction: column;
}

.pro-dropdown a {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #C6CCC6;
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 8px;
  transition: background 0.2s ease, color 0.2s ease;
  white-space: nowrap;
}

.pro-dropdown a:hover {
  background-color: #204878;
  color: #ffffff;
  text-decoration: none;
}

/* ── Right Side ── */
.pro-nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.pro-nav-phone {

  align-items: center;
  gap: 8px;

  color: #809AB1;

.pro-nav-phone:hover {

/* ── CTA Button ── */
.pro-nav-btn {
  display: inline-block;
  background-color: #1C3C68;
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 12px 28px;
  border-radius: 50px;
  border: 2px solid #809AB1;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.3s ease, border 0.3s ease, color 0.3s ease;
}

.pro-nav-btn:hover {
  background-color: transparent;
  border: 2px solid #809AB1;
  border-color: #1C3C68;
  color: #ffffff;
  text-decoration: none;
}

/* ── Hamburger ── */
.pro-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  flex-shrink: 0;
}

.pro-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background-color: #C6CCC6;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.pro-hamburger.pro-ham-active span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}

.pro-hamburger.pro-ham-active span:nth-child(2) {
  opacity: 0;
}

.pro-hamburger.pro-ham-active span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* ── Mobile Menu ── */
.pro-mobile-menu {
  display: none;
  flex-direction: column;
  background-color: #1C3C68;
  padding: 16px 24px 24px;
  border-top: 1px solid #809AB1;
}

.pro-mobile-menu.pro-menu-open {

}

.pro-mobile-menu a {

}
