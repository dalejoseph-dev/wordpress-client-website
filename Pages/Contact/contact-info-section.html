<style>
/* Section Wrapper */
.contact-info-section {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 80px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Card */
.contact-info-card {
  background-color: #ffffff;
  border: 1px solid #809AB1;
  border-radius: 16px;
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 220px;
  transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
  cursor: default;
}

.contact-info-card:hover {
  border-color: #204878;
  box-shadow: 0 8px 32px rgba(32, 72, 120, 0.12);
  transform: translateY(-4px);
}

/* Icon */
.contact-info-icon {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  background-color: #C6CCC6;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: auto;
  transition: background 0.3s ease;
}

.contact-info-card:hover .contact-info-icon {
  background-color: #204878;
}

.contact-info-card:hover .contact-info-icon svg {
  stroke: #ffffff;
}

/* Text */
.contact-info-text {
  padding-top: 40px;
}

.contact-info-text h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0 0 10px 0;
  line-height: 1.3;
}

.contact-info-text p {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #809AB1;
  margin: 0;
  line-height: 1.6;
}

/* Tablet - 1024px */
@media (max-width: 1024px) {
  .contact-info-section {
    grid-template-columns: repeat(2, 1fr);
    padding: 60px 40px;
    gap: 16px;
  }

  .contact-info-card {
    min-height: 200px;
  }
}

/* Mobile - 600px */
@media (max-width: 600px) {
  .contact-info-section {
    grid-template-columns: 1fr;
    padding: 48px 24px;
  }

  .contact-info-card {
    min-height: unset;
    padding: 28px 24px;
  }

  .contact-info-text {
    padding-top: 28px;
  }
}
</style>
