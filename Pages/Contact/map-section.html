<div class="map-section">

  <!-- Section Header -->
  <div class="map-section-header">
    <div class="map-section-label">
      <span>Find Us</span>
      <div class="map-section-label-line"></div>
    </div>
    <h2 class="map-section-title">Our Location</h2>
  </div>

  <!-- Map Container -->
  <div class="map-container">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3067.123456789!2d-105.0!3d39.73!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876b80!2sW+13th+Ave%2C+Colorado!5e0!3m2!1sen!2sus!4v1234567890"
      width="100%"
      height="100%"
      style="border:0;"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <!-- Info Bar -->
  <div class="map-info-bar">

    <div class="map-info-item">
      <div class="map-info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div class="map-info-text">
        <span class="map-info-label">Our Address</span>
        <span class="map-info-value">W 13th Parks Suite 559, Denver</span>
      </div>
    </div>

    <div class="map-info-divider"></div>

    <div class="map-info-item">
      <div class="map-info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="map-info-text">
        <span class="map-info-label">Phone Number</span>
        <span class="map-info-value">+0 (123) 45678</span>
      </div>
    </div>

    <div class="map-info-divider"></div>

    <div class="map-info-item">
      <div class="map-info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="map-info-text">
        <span class="map-info-label">Email Address</span>
        <span class="map-info-value">support@example.com</span>
      </div>
    </div>

    <div class="map-info-divider"></div>

    <div class="map-info-item">
      <div class="map-info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
      </div>
      <div class="map-info-text">

        <span class="map-info-value">Mon - Fri 9 AM to 4 PM</span>
      </div>
    </div>

  </div>
</div>

<style>
/* Section Wrapper */
.map-section {
  padding: 80px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.map-section-header {
  margin-bottom: 40px;
}

/* Label */
.map-section-label {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.map-section-label span {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #1C3C68;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.map-section-label-line {
  height: 1px;
  width: 140px;
  background-color: #809AB1;
}

/* Title */
.map-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0;
  line-height: 1.15;
}

/* Map Container */
.map-container {
  width: 100%;
  height: 460px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #809AB1;
  margin-bottom: 0;
}

/* Info Bar */
.map-info-bar {
  display: flex;
  align-items: center;
  background-color: #204878;
  border-radius: 0 0 16px 16px;
  padding: 28px 40px;
  gap: 0;
}

/* Info Item */
.map-info-item {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
}

/* Icon */
.map-info-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background-color: #1C3C68;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.3s ease;
}

.map-info-item:hover .map-info-icon {
  background-color: #0E2C4F;
}

/* Text */
.map-info-text {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.map-info-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: #809AB1;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.map-info-value {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #ffffff;
  font-weight: 500;
  line-height: 1.4;
}

/* Divider */
.map-info-divider {
  width: 1px;
  height: 40px;
  background-color: #1C3C68;
  margin: 0 28px;
  flex-shrink: 0;
}

/* Tablet - 1024px */
@media (max-width: 1024px) {
  .map-section {
    padding: 60px 40px;
  }

  .map-section-title {
    font-size: 38px;
  }

  .map-container {
    height: 380px;
  }

  .map-info-bar {
    padding: 24px 28px;
  }

  .map-info-divider {
    margin: 0 16px;
  }

  .map-info-value {
    font-size: 12px;
  }
}

/* Mobile - 768px */
@media (max-width: 768px) {
  .map-section {
    padding: 48px 24px;
  }

  .map-section-title {
    font-size: 30px;
  }

  .map-container {
    height: 300px;
    border-radius: 16px 16px 0 0;
  }

  .map-info-bar {
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    padding: 24px 20px;
    border-radius: 0 0 16px 16px;
  }

  .map-info-item {
    width: 100%;
  }

  .map-info-divider {
    width: 100%;
    height: 1px;
    margin: 0;
    background-color: #1C3C68;
  }
}
</style>
