<style>
    /* Section Wrapper */
.team-section {
  padding: 80px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.team-header {
  text-align: center;
  margin-bottom: 60px;
}

.team-header-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}

.team-header-label span {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #1C3C68;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.team-header-line {
  height: 1px;
  width: 120px;
  background-color: #809AB1;
}

.team-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0;
  line-height: 1.15;
}

/* Grid */
.team-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Card */
.team-card {
  background-color: #ffffff;
  border: 1px solid #809AB1;
  border-radius: 16px;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.3s ease;
}

.team-card:hover {
  box-shadow: 0 12px 40px rgba(32, 72, 120, 0.15);
  transform: translateY(-4px);
}

/* Image Wrap */
.team-card-img-wrap {
  position: relative;
  background-color: #C6CCC6;
  overflow: hidden;
}

.team-card-img-wrap img {
  width: 100%;
  height: 360px;
  object-fit: cover;
  object-position: top;
  display: block;
  transition: transform 0.4s ease;
}

.team-card:hover .team-card-img-wrap img {
  transform: scale(1.03);
}

/* Social Bar */
.team-card-socials {
  position: absolute;
  bottom: 16px;
  right: 16px;
  background-color: #ffffff;
  border-radius: 50px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 4px 16px rgba(14, 44, 79, 0.15);
}

.team-social {
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.team-social:hover {
  opacity: 0.6;
  transform: scale(1.15);
}

/* Card Info */
.team-card-info {
  padding: 24px;
  text-align: center;
  background-color: #ffffff;
}

.team-card-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 400;
  color: #0E2C4F;
  margin: 0 0 8px 0;
}

.team-card-info p {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #809AB1;
  margin: 0;
  letter-spacing: 0.3px;
}

/* Tablet - 1024px */
@media (max-width: 1024px) {
  .team-section {
    padding: 60px 40px;
  }

  .team-header-title {
    font-size: 40px;
  }

  .team-card-img-wrap img {
    height: 300px;
  }
}

/* Mobile - 600px */
@media (max-width: 600px) {
  .team-section {
    padding: 48px 24px;
  }

  .team-header-title {
    font-size: 30px;
  }

  .team-header-line {
    width: 60px;
  }

  .team-grid {
    grid-template-columns: 1fr;
  }

  .team-card-img-wrap img {
    height: 320px;
  }
}
</style>
